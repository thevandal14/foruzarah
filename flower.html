    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Special Flowers, Roses, Hearts & Music</title>

    <style>
        /* =========================================
           GAYA KHUSUS TEKS (Terang-Redup Perlahan)
           ========================================= */
        .text-wrapper {
            position: absolute;
            top: 5%; 
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            font-family: 'Poppins', cursive;
            color: azure;
            width: 100%;
            pointer-events: none; /* Agar teks tidak menghalangi klik pada bunga */
        }
        
        .greetings {
            font-size: 4rem; 
            font-weight: 900;
            margin-bottom: -10px;
            animation: slow-glow 4s ease-in-out infinite;
        }
        
        .greetings > span { display: inline-block; }
        
        .description {
            font-size: 0.9rem; 
            margin-top: 10px;
            font-family: 'Poppins', cursive;
            animation: slow-glow-desc 4s ease-in-out infinite;
        }

        @keyframes slow-glow {
            0%, 100% { color: #fff; text-shadow: 0 0 12px #39c6d6, 0 0 40px #39c6d6, 0 0 80px #39c6d6; }
            50% { color: #555; text-shadow: 0 0 5px rgba(57, 198, 214, 0.2); }
        }

        @keyframes slow-glow-desc {
            0%, 100% { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
            50% { color: #888; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        }

        /* =========================================
           GAYA KHUSUS MAWAR (GELAP, PENDEK, & RAPI)
           ========================================= */
        .flower--rose .flower__leaf {
            background-color: #8b0000; 
            background-image: linear-gradient(to top, #330000, #8b0000); 
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; 
        }
        .flower--rose .flower__leafs::after { background-color: #4d0000; }
        .flower--rose .flower__white-circle {
            background-color: #1a0000; 
            box-shadow: 0 0 2vmin #660000;
        }

        @keyframes moving-rose-left {
            0%, 100% { transform: scale(0.6) rotate(15deg); }
            50% { transform: scale(0.6) rotate(10deg); }
        }
        @keyframes moving-rose-right {
            0%, 100% { transform: scale(0.55) rotate(-15deg); }
            50% { transform: scale(0.55) rotate(-20deg); }
        }

        .flower--rose-left {
            left: 35%;
            bottom: 5vmin; 
            z-index: 8; 
            animation: moving-rose-left 4s linear infinite;
        }
        .flower--rose-left .flower__line { height: 40vmin; animation-delay: 0.2s; } 

        .flower--rose-right {
            left: 65%;
            bottom: 5vmin; 
            z-index: 8;
            animation: moving-rose-right 4s linear infinite;
        }
        .flower--rose-right .flower__line { height: 35vmin; animation-delay: 0.4s; }

        /* =========================================
           GAYA KANVAS UNTUK PARTIKEL
           ========================================= */
        #particles-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; pointer-events: none; 
        }

        /* =========================================
           GAYA TOMBOL MENU MUSIK 
           ========================================= */
        .music-menu {
            position: fixed; right: 30px; bottom: 40px; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .menu-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background-color: rgba(20, 117, 122, 0.6); 
            border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-size: 28px; cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 198, 214, 0.4);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 2; transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .menu-btn:hover {
            transform: scale(1.1); box-shadow: 0 0 25px rgba(57, 198, 214, 0.8);
            background-color: rgba(57, 198, 214, 0.8);
        }

        .menu-options { position: absolute; top: 50%; left: 50%; width: 0; height: 0; z-index: 1; }

        .song-btn {
            position: absolute; top: 50%; left: 50%;
            margin-top: -22.5px; margin-left: -22.5px;
            width: 45px; height: 45px; border-radius: 50%;
            background-color: rgba(57, 198, 214, 0.4); border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-weight: 900; font-size: 16px; cursor: pointer;
            box-shadow: 0 0 10px rgba(57, 198, 214, 0.3); backdrop-filter: blur(8px);
            opacity: 0; transform: scale(0); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; justify-content: center;
        }
        .song-btn:hover { background-color: rgba(167, 255, 238, 0.9); color: #111; box-shadow: 0 0 20px rgba(167, 255, 238, 0.8); }

        .music-menu.active .song-btn:nth-child(1) { opacity: 1; transform: translateY(-75px) scale(1); }
        .music-menu.active .song-btn:nth-child(2) { opacity: 1; transform: translateY(-135px) scale(1); }
        .music-menu.active .song-btn:nth-child(3) { opacity: 1; transform: translateY(-195px) scale(1); }

        /* =========================================
           GAYA TOMBOL PINDAH HALAMAN (NEXT PAGE)
           ========================================= */
        .next-page-btn {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            width: 55px; height: 55px; border-radius: 50%;
            background-color: rgba(57, 198, 214, 0.4); border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-size: 26px; cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 198, 214, 0.4); backdrop-filter: blur(8px);
            z-index: 1000; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .next-page-btn:hover {
            transform: translateY(-50%) scale(1.15); background-color: rgba(167, 255, 238, 0.9);
            color: #111; box-shadow: 0 0 25px rgba(167, 255, 238, 0.8);
        }

        /* =========================================
           LAYAR HITAM UNTUK TRANSISI SLIDE
           ========================================= */
        .slide-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 9999; transform: translateX(100%); 
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); pointer-events: none;
        }
        .slide-overlay.active { transform: translateX(0); pointer-events: all; }

        /* =========================================
           RESPONSIVITAS UNTUK SMARTPHONE (MOBILE)
           ========================================= */
        @media screen and (max-width: 600px) {
            /* Menyesuaikan Teks Utama */
            .text-wrapper { top: 12%; }
            .greetings { font-size: 2.2rem; letter-spacing: 1px; }
            .description { font-size: 0.9rem; margin-top: 5px; }

            /* Menyesuaikan Posisi dan Skala Bunga Mawar Samping */
            .flower--rose-left { left: 10%; bottom: 10vmin; }
            .flower--rose-right { left: 75%; bottom: 10vmin; }
            
            /* Mengubah skala animasi mawar agar lebih kecil di HP */
            @keyframes moving-rose-left {
                0%, 100% { transform: scale(0.35) rotate(15deg); }
                50% { transform: scale(0.35) rotate(10deg); }
            }
            @keyframes moving-rose-right {
                0%, 100% { transform: scale(0.35) rotate(-15deg); }
                50% { transform: scale(0.35) rotate(-20deg); }
            }

            /* Menyesuaikan Tombol Musik */
            .music-menu { right: 15px; bottom: 20px; }
            .menu-btn { width: 50px; height: 50px; font-size: 24px; }
            .song-btn { width: 40px; height: 40px; margin-top: -20px; margin-left: -20px; font-size: 14px; }
            
            /* Menyesuaikan pancaran tombol menu di HP */
            .music-menu.active .song-btn:nth-child(1) { transform: translateY(-65px) scale(1); }
            .music-menu.active .song-btn:nth-child(2) { transform: translateY(-115px) scale(1); }
            .music-menu.active .song-btn:nth-child(3) { transform: translateY(-165px) scale(1); }

            /* Menyesuaikan Tombol Panah Pindah Halaman */
            .next-page-btn { right: 15px; width: 45px; height: 45px; font-size: 20px; }
        }

    </style>

    <script>
        window.onload = () => {
            document.body.classList.remove("container");
        };

        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#39c6d6', '#ff66ff', '#ffcc00', '#ff3333', '#a7ffee']; 

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                this.radius = Math.random() * 4 + 2; 
                this.isHeart = Math.random() > 0.6; 
                
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 0.5; 
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.alpha = 1; 
                this.decay = Math.random() * 0.015 + 0.005; 
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                if (this.isHeart) {
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    
                    const w = this.radius * 3.5; 
                    const topCurveHeight = w * 0.3;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -w/2 + topCurveHeight);
                    ctx.bezierCurveTo(0, -w/2, -w/2, -w/2, -w/2, -w/2 + topCurveHeight);
                    ctx.bezierCurveTo(-w/2, -w/2 + (w + topCurveHeight)/2, 0, -w/2 + (w + topCurveHeight)/2, 0, w/2);
                    ctx.bezierCurveTo(0, -w/2 + (w + topCurveHeight)/2, w/2, -w/2 + (w + topCurveHeight)/2, w/2, -w/2 + topCurveHeight);
                    ctx.bezierCurveTo(w/2, -w/2, 0, -w/2, 0, -w/2 + topCurveHeight);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy + 0.15; 
                this.alpha -= this.decay;
                if (this.isHeart) {
                    this.rotation += this.rotationSpeed; 
                }
            }
        }

        function createExplosion(x, y) {
            const numParticles = 12; 
            for (let i = 0; i < numParticles; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, color));
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        setInterval(() => {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6); 
            createExplosion(x, y);
        }, 1200);

        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // =========================================
        // SCRIPT LOGIKA PEMUTAR MUSIK
        // =========================================
        const audio = document.getElementById('bg-music');
        const menuBtn = document.getElementById('menu-btn');
        const musicMenu = document.querySelector('.music-menu');

        menuBtn.addEventListener('click', () => {
            musicMenu.classList.toggle('active');
            
            if (audio.paused) {
                audio.play().catch(e => console.log("Menunggu interaksi pengguna..."));
            }
        });

        function playSong(songSrc) {
            audio.src = songSrc;
            audio.play();
            musicMenu.classList.remove('active');
        }

        window.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => {});
            }
        }, { once: true });

        // =========================================
        // SCRIPT FUNGSI TRANSISI SLIDE ANTAR HALAMAN
        // =========================================
        function slideAndRedirect(url) {
            const overlay = document.getElementById('slide-overlay');
            overlay.classList.add('active');
            
            setTimeout(() => {
                window.location.href = url;
            }, 600); 
        }
    </script>
</body>
</html>
