<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;1,900&display=swap" rel="stylesheet">
    <title>Abstract Particles Magic & Music</title>
    <style>
        /* =========================================
           GAYA DASAR & KANVAS
           ========================================= */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas { display: block; }

        /* =========================================
           GAYA TOMBOL KEMBALI KACA (TENGAH KIRI)
           ========================================= */
        .back-btn-glass {
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%); 
            width: 55px; height: 55px; border-radius: 50%;
            background-color: rgba(57, 198, 214, 0.4); border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-size: 26px; cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 198, 214, 0.4);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 1000; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; padding-right: 3px; 
        }
        .back-btn-glass:hover {
            transform: translateY(-50%) scale(1.15); 
            background-color: rgba(167, 255, 238, 0.9); color: #111;
            box-shadow: 0 0 25px rgba(167, 255, 238, 0.8);
        }

        /* =========================================
           GAYA TOMBOL SURAT KACA (TENGAH KANAN)
           ========================================= */
        .next-btn-glass {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            width: 55px; height: 55px; border-radius: 50%;
            background-color: rgba(57, 198, 214, 0.4); border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-size: 24px; cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 198, 214, 0.4);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 1000; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .next-btn-glass:hover {
            transform: translateY(-50%) scale(1.15);
            background-color: rgba(167, 255, 238, 0.9); color: #111;
            box-shadow: 0 0 25px rgba(167, 255, 238, 0.8);
        }

        /* =========================================
           GAYA TOMBOL MENU MUSIK KACA (KANAN BAWAH)
           ========================================= */
        .music-menu {
            position: fixed; right: 30px; bottom: 40px; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .menu-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background-color: rgba(20, 117, 122, 0.6); border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-size: 28px; cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 198, 214, 0.4);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 2; transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .menu-btn:hover {
            transform: scale(1.1); box-shadow: 0 0 25px rgba(57, 198, 214, 0.8);
            background-color: rgba(57, 198, 214, 0.8);
        }
        .menu-options { position: absolute; top: 50%; left: 50%; width: 0; height: 0; z-index: 1; }
        .song-btn {
            position: absolute; top: 50%; left: 50%; margin-top: -22.5px; margin-left: -22.5px;
            width: 45px; height: 45px; border-radius: 50%;
            background-color: rgba(57, 198, 214, 0.4); border: 1px solid rgba(167, 255, 238, 0.5);
            color: rgba(255, 255, 255, 0.9); font-weight: 900; font-size: 16px; cursor: pointer;
            box-shadow: 0 0 10px rgba(57, 198, 214, 0.3); backdrop-filter: blur(8px);
            opacity: 0; transform: scale(0); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; justify-content: center;
        }
        .song-btn:hover {
            background-color: rgba(167, 255, 238, 0.9); color: #111;
            box-shadow: 0 0 20px rgba(167, 255, 238, 0.8);
        }
        .music-menu.active .song-btn:nth-child(1) { opacity: 1; transform: translateY(-75px) scale(1); }
        .music-menu.active .song-btn:nth-child(2) { opacity: 1; transform: translateY(-135px) scale(1); }
        .music-menu.active .song-btn:nth-child(3) { opacity: 1; transform: translateY(-195px) scale(1); }

        /* =========================================
           LAYAR HITAM UNTUK TRANSISI SLIDE
           ========================================= */
        .slide-overlay-left {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 9999; transform: translateX(-100%); 
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); pointer-events: none;
        }
        .slide-overlay-left.active { transform: translateX(0); pointer-events: all; }
        .slide-overlay-right {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 9999; transform: translateX(100%); 
            transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); pointer-events: none;
        }
        .slide-overlay-right.active { transform: translateX(0); pointer-events: all; }

        /* =========================================
           RESPONSIVITAS UNTUK LAYAR HP
           ========================================= */
        @media screen and (max-width: 600px) {
            .back-btn-glass, .next-btn-glass { width: 45px; height: 45px; font-size: 20px; }
            .back-btn-glass { left: 15px; }
            .next-btn-glass { right: 15px; }
            .music-menu { right: 15px; bottom: 20px; }
            .menu-btn { width: 50px; height: 50px; font-size: 24px; }
            .song-btn { width: 40px; height: 40px; margin-top: -20px; margin-left: -20px; font-size: 14px; }
            .music-menu.active .song-btn:nth-child(1) { transform: translateY(-65px) scale(1); }
            .music-menu.active .song-btn:nth-child(2) { transform: translateY(-115px) scale(1); }
            .music-menu.active .song-btn:nth-child(3) { transform: translateY(-165px) scale(1); }
        }
    </style>
</head>
<body>

    <div class="slide-overlay-left" id="slide-overlay-left"></div>
    <div class="slide-overlay-right" id="slide-overlay-right"></div>

    <audio id="bg-music" loop>
        <source src="music/default.mp3" type="audio/mpeg">
    </audio>

    <button class="back-btn-glass" onclick="slideBackAndRedirect('flower.html')">⬅</button>
    <button class="next-btn-glass" onclick="slideNextAndRedirect('surat.html')">✉️</button>

    <div class="music-menu">
        <button class="menu-btn" id="menu-btn">🎵</button>
        <div class="menu-options">
            <button class="song-btn" onclick="playSong('music/1.mp3')">1</button>
            <button class="song-btn" onclick="playSong('music/2.mp3')">2</button>
            <button class="song-btn" onclick="playSong('music/3.mp3')">3</button>
        </div>
    </div>

    <canvas id="scene"></canvas>

    <script>
        // =========================================
        // LOGIKA KANVAS PARTIKEL UTAMA & LATAR
        // =========================================
        const canvas = document.getElementById('scene');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let width, height;
        let particles = [];
        let bgParticles = []; 
        
        // Menambah jumlah partikel agar bentuk lebih JELAS & PADAT
        let PARTICLE_COUNT = 1500; 
        const BG_PARTICLE_COUNT = 300; 

        let isFormingShape = false; 
        let shapeIndex = 0; 
        
        function getResponsiveShapes() {
            const isMobile = width < 600;
            const shapeSize = isMobile ? 180 : 350; // Ukuran Kue & Love
            const textSize = isMobile ? 60 : 120; // Ukuran Teks
            const lineSpacing = isMobile ? 70 : 130;

            return [
                { type: 'cake', size: shapeSize }, 
                { type: 'heart', size: shapeSize }, 
                { type: 'multiline', text1: 'HAPPY', text2: 'BIRTHDAY', text3: 'UZARA', size: textSize, spacing: lineSpacing } 
            ];
        }

        // =========================================
        // KELAS PARTIKEL LATAR BELAKANG (BINTANG)
        // =========================================
        class BgParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random();
                this.alphaChange = (Math.random() * 0.02) - 0.01;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
                this.alpha += this.alphaChange;
                if (this.alpha <= 0.1 || this.alpha >= 0.8) this.alphaChange *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // =========================================
        // KELAS PARTIKEL UTAMA (PEMBENTUK WUJUD)
        // =========================================
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = this.x;
                this.targetY = this.y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                
                // Ukuran partikel disesuaikan agar detail wujud lebih rapi
                this.radius = Math.random() * 1.5 + 1.0; 
                this.hue = Math.random() * 360; 
                
                this.angle = Math.random() * Math.PI * 2; 
                this.floatSpeed = Math.random() * 0.05 + 0.02; 
                this.floatRadius = Math.random() * 2 + 0.5; 
                
                this.springFactor = Math.random() * 0.005 + 0.001;

                this.isOrbiter = false;
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.baseOrbitRadius = 0;
                this.orbitSpeed = 0;
                this.wobbleAngle = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0;
                this.wobbleSize = 0;
            }

            update() {
                this.hue += 0.5; 
                
                if (isFormingShape) {
                    if (this.isOrbiter) {
                        this.orbitAngle += this.orbitSpeed;
                        this.wobbleAngle += this.wobbleSpeed;
                        const currentRadius = this.baseOrbitRadius + Math.sin(this.wobbleAngle) * this.wobbleSize;
                        const orbitTargetX = (width / 2) + Math.cos(this.orbitAngle) * currentRadius;
                        const orbitTargetY = (height / 2) + Math.sin(this.orbitAngle) * (currentRadius * 0.5) + Math.cos(this.wobbleAngle * 1.5) * 50; 
                        
                        this.vx += (orbitTargetX - this.x) * this.springFactor; 
                        this.vy += (orbitTargetY - this.y) * this.springFactor;
                        this.vx *= 0.95; 
                        this.vy *= 0.95;
                    } else {
                        this.vx += (this.targetX - this.x) * this.springFactor;
                        this.vy += (this.targetY - this.y) * this.springFactor;
                        this.vx *= 0.92; // Rem yang lebih kuat agar bentuk tak goyang
                        this.vy *= 0.92;
                        
                        // Efek melayang pelan
                        this.angle += this.floatSpeed;
                        this.x += Math.sin(this.angle) * this.floatRadius * 0.1;
                        this.y += Math.cos(this.angle) * this.floatRadius * 0.1;
                    }
                } else {
                    this.vx += (Math.random() - 0.5) * 0.3; 
                    this.vy += (Math.random() - 0.5) * 0.3;
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (speed > 2) { 
                        this.vx = (this.vx / speed) * 2;
                        this.vy = (this.vy / speed) * 2;
                    }
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // =========================================
        // FUNGSI MENGGAMBAR WUJUD PRESISI (VECTOR PATH)
        // =========================================
        function getShapeCoordinates(shapeDef) {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
            
            offCanvas.width = width;
            offCanvas.height = height;
            offCtx.fillStyle = 'white';

            if (shapeDef.type === 'cake') {
                const s = shapeDef.size; 
                offCtx.translate(width / 2, height / 2 + s * 0.4);
                
                // Lapisan Bawah
                offCtx.fillRect(-s*0.6, -s*0.3, s*1.2, s*0.3);
                // Lapisan Tengah
                offCtx.fillRect(-s*0.45, -s*0.6, s*0.9, s*0.3);
                // Lapisan Atas
                offCtx.fillRect(-s*0.3, -s*0.9, s*0.6, s*0.3);
                
                // Lilin (Kiri, Tengah, Kanan)
                offCtx.fillRect(-s*0.15, -s*1.2, s*0.04, s*0.3);
                offCtx.fillRect(-s*0.02, -s*1.25, s*0.04, s*0.35);
                offCtx.fillRect(s*0.11, -s*1.2, s*0.04, s*0.3);
                
                // Api Lilin
                offCtx.beginPath(); offCtx.arc(-s*0.13, -s*1.3, s*0.06, 0, Math.PI*2); offCtx.fill();
                offCtx.beginPath(); offCtx.arc(0, -s*1.35, s*0.06, 0, Math.PI*2); offCtx.fill();
                offCtx.beginPath(); offCtx.arc(s*0.13, -s*1.3, s*0.06, 0, Math.PI*2); offCtx.fill();

            } else if (shapeDef.type === 'heart') {
                const s = shapeDef.size * 0.6; // Skala Love
                offCtx.translate(width / 2, height / 2 - s * 0.3);
                offCtx.beginPath();
                const topCurveHeight = s * 0.3;
                offCtx.moveTo(0, topCurveHeight);
                offCtx.bezierCurveTo(0, 0, -s, 0, -s, topCurveHeight);
                offCtx.bezierCurveTo(-s, (s + topCurveHeight) / 2, 0, s * 1.3, 0, s * 1.6);
                offCtx.bezierCurveTo(0, s * 1.3, s, (s + topCurveHeight) / 2, s, topCurveHeight);
                offCtx.bezierCurveTo(s, 0, 0, 0, 0, topCurveHeight);
                offCtx.fill();

            } else if (shapeDef.type === 'multiline') {
                offCtx.textAlign = 'center';
                offCtx.textBaseline = 'middle';
                offCtx.font = `900 ${shapeDef.size}px 'Arial Black', Arial, sans-serif`;
                offCtx.fillText(shapeDef.text1, width / 2, height / 2 - shapeDef.spacing);
                offCtx.fillText(shapeDef.text2, width / 2, height / 2);
                offCtx.fillText(shapeDef.text3, width / 2, height / 2 + shapeDef.spacing);
            }

            const data = offCtx.getImageData(0, 0, width, height).data;
            const points = [];
            
            // Jarak pemindaian piksel (Lebih kecil = Lebih padat partikelnya)
            const step = (width < 600) ? 3 : 5; 
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const alphaIndex = (y * width + x) * 4 + 3;
                    if (data[alphaIndex] > 128) {
                        points.push({ x: x, y: y });
                    }
                }
            }
            return points;
        }

        function setTargetShape(points) {
            if (points.length === 0) return;
            particles.sort(() => Math.random() - 0.5);

            let sampledPoints = points;
            // Gunakan hingga 90% partikel untuk bentuk utama agar sangat jelas
            const maxPointsForShape = Math.floor(particles.length * 0.90); 
            
            if (points.length > maxPointsForShape) {
                const step = points.length / maxPointsForShape;
                sampledPoints = [];
                for(let i = 0; i < points.length; i += step) {
                    sampledPoints.push(points[Math.floor(i)]);
                }
            }

            const isMobile = width < 600;

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                if (i < sampledPoints.length) {
                    p.isOrbiter = false;
                    p.targetX = sampledPoints[i].x;
                    p.targetY = sampledPoints[i].y;
                } else {
                    p.isOrbiter = true;
                    const orbitBase = isMobile ? 80 : 120;
                    const orbitVar = isMobile ? 60 : 80;
                    p.baseOrbitRadius = Math.random() * orbitVar + orbitBase; 
                    p.orbitSpeed = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.02 + 0.005);
                    p.wobbleSpeed = Math.random() * 0.03 + 0.01;
                    p.wobbleAngle = Math.random() * Math.PI * 2;
                    p.wobbleSize = Math.random() * 30 + 10; 
                }
            }
            isFormingShape = true;
        }

        function runSequence() {
            isFormingShape = false;
            
            setTimeout(() => {
                const currentShapes = getResponsiveShapes();
                const currentShape = currentShapes[shapeIndex];
                
                const points = getShapeCoordinates(currentShape);
                setTargetShape(points);
                
                shapeIndex = (shapeIndex + 1) % currentShapes.length;
                
                setTimeout(runSequence, 12000); // Tahan bentuk selama 12 detik

            }, 3000); // Partikel bubar dan istirahat 3 detik
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            const isMobile = width < 600;
            PARTICLE_COUNT = isMobile ? 900 : 1800; // Jumlah pasukan partikel ditambah
            
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }

            bgParticles = [];
            for (let i = 0; i < BG_PARTICLE_COUNT; i++) {
                bgParticles.push(new BgParticle());
            }
        }

        function animate() {
            // Efek ekor partikel
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)'; 
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < bgParticles.length; i++) {
                bgParticles[i].update();
                bgParticles[i].draw();
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        init();
        animate();
        runSequence(); 

        // =========================================
        // LOGIKA PEMUTAR MUSIK & TRANSISI
        // =========================================
        const audio = document.getElementById('bg-music');
        const menuBtn = document.getElementById('menu-btn');
        const musicMenu = document.querySelector('.music-menu');

        menuBtn.addEventListener('click', () => {
            musicMenu.classList.toggle('active');
            if (audio.paused) {
                audio.play().catch(e => console.log("Menunggu interaksi..."));
            }
        });

        function playSong(songSrc) {
            audio.src = songSrc;
            audio.play();
            musicMenu.classList.remove('active');
        }

        window.addEventListener('click', () => {
            if (audio.paused) audio.play().catch(e => {});
        }, { once: true });

        function slideBackAndRedirect(url) {
            document.getElementById('slide-overlay-left').classList.add('active');
            setTimeout(() => { window.location.href = url; }, 600); 
        }

        function slideNextAndRedirect(url) {
            document.getElementById('slide-overlay-right').classList.add('active');
            setTimeout(() => { window.location.href = url; }, 600); 
        }
    </script>
</body>
</html>
